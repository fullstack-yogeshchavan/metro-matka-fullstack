server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    location / { try_files $uri $uri/ /index.html; }
    location /api/ { proxy_pass http://backend:8080/api/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /ws/  { proxy_pass http://backend:8080/ws/; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "Upgrade"; proxy_read_timeout 86400; }
    location ~* \.(js|css|png|jpg|ico|svg|woff|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; }
}
